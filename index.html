<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael Petychakis</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="lambda_owl_avatar.png" />
  <link rel="apple-touch-icon" href="lambda_owl_avatar.png" />

  <!-- Open Graph / Social -->
  <meta property="og:type"         content="website" />
  <meta property="og:url"          content="https://mpetyx.com/" />
  <meta property="og:title"        content="Michael Petychakis" />
  <meta property="og:description"  content="λ(0) → 700 · Technology leader, entrepreneur, and builder. CTO · Fractional CTO · API & AI enthusiast." />
  <meta property="og:image"        content="https://mpetyx.com/lambda_owl_avatar.png" />
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@mpetyx" />
  <meta name="twitter:title"       content="Michael Petychakis" />
  <meta name="twitter:description" content="λ(0) → 700 · Technology leader, entrepreneur, and builder." />
  <meta name="twitter:image"       content="https://mpetyx.com/lambda_owl_avatar.png" />
  <meta name="description"         content="λ(0) → 700 · Technology leader, entrepreneur, and builder. CTO · Fractional CTO · API & AI enthusiast." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #0F172A;
      --cyan:      #06B6D4;
      --cyan-dim:  rgba(6, 182, 212, 0.15);
      --cyan-glow: rgba(6, 182, 212, 0.45);
      --white:     #F8FAFC;
      --gray:      #64748B;
      --gray-sub:  #94A3B8;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    /* Main card */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      filter:
        drop-shadow(0 0 18px var(--cyan-glow))
        drop-shadow(0 0 40px rgba(6, 182, 212, 0.22));
      transition: filter 0.3s ease;
    }

    .logo:hover {
      filter:
        drop-shadow(0 0 28px var(--cyan))
        drop-shadow(0 0 60px var(--cyan-glow));
    }

    /* Name */
    h1.name {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 5vw, 2rem);
      color: var(--white);
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    /* Lambda tagline */
    .tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      color: var(--cyan);
      letter-spacing: 0.04em;
    }

    /* Greek subtitle */
    .subtitle {
      font-family: 'Montserrat', sans-serif;
      font-style: italic;
      font-weight: 400;
      font-size: 0.95rem;
      color: var(--gray-sub);
      letter-spacing: 0.02em;
    }

    /* Link pills */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      margin-top: 0.5rem;
    }

    .pill {
      display: block;
      width: 100%;
      padding: 0.75rem 1.5rem;
      border: 1.5px solid var(--cyan);
      border-radius: 9999px;
      background: transparent;
      color: var(--white);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition:
        background 0.22s ease,
        box-shadow  0.22s ease,
        color       0.22s ease;
    }

    .pill:hover,
    .pill:focus-visible {
      background: var(--cyan-dim);
      box-shadow: 0 0 18px var(--cyan-glow), 0 0 6px var(--cyan-glow);
      color: var(--cyan);
      outline: none;
    }

    /* Footer */
    footer {
      margin-top: 3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--gray);
      letter-spacing: 0.06em;
      text-align: center;
    }
  </style>
</head>
<body>

  <main class="card">

    <img
      class="logo"
      src="lambda_owl_avatar.png"
      alt="Owl Lambda — Michael Petychakis logo"
      width="140"
      height="140"
    />

    <h1 class="name">Michael Petychakis</h1>

    <p class="tagline">&#955;(0) &#8594; 700</p>

    <p class="subtitle">&#922;&#959;&#943;&#964;&#945; &#968;&#951;&#955;&#940;.</p>

    <nav class="links" aria-label="Links">
      <a class="pill" href="https://apilama.com"            target="_blank" rel="noopener noreferrer">Blog</a>
      <a class="pill" href="https://badcop.tech"            target="_blank" rel="noopener noreferrer">Fractional CTO</a>
      <a class="pill" href="https://x.com/mpetyx"           target="_blank" rel="noopener noreferrer">Twitter / X</a>
      <a class="pill" href="https://linkedin.com/in/mpetyx" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a class="pill" href="https://github.com/mpetyx"      target="_blank" rel="noopener noreferrer">GitHub</a>
    </nav>

  </main>

  <footer>Made in Athens. Deployed globally.</footer>

</body>
</html>
